server {
    listen 80;
    server_name gateway.live-interpreter.shalomworks.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name gateway.live-interpreter.shalomworks.tech;

    ssl_certificate /etc/letsencrypt/live/gateway.live-interpreter.shalomworks.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gateway.live-interpreter.shalomworks.tech/privkey.pem;

    location = /health {
        proxy_pass http://127.0.0.1:8787/health;
    }

    location = /translate {
        proxy_pass http://127.0.0.1:8787/translate;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Origin $http_origin;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}
