<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Live Interpreter</title>
  <desc id="desc">Speak naturally. Be heard worldwide. Browser-based AI voice interpretation with a 1-minute free trial.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d2d2e"/>
      <stop offset="0.55" stop-color="#17695f"/>
      <stop offset="1" stop-color="#2c8b75"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#bce8d8" stop-opacity=".34"/>
      <stop offset="1" stop-color="#bce8d8" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#00191b" flood-opacity=".32"/>
    </filter>
  </defs>
  <rect width="1200" height="630" rx="0" fill="url(#background)"/>
  <circle cx="1010" cy="92" r="310" fill="url(#glow)"/>
  <circle cx="108" cy="590" r="250" fill="url(#glow)"/>

  <g opacity=".18" fill="none" stroke="#dff9ef" stroke-width="2">
    <circle cx="965" cy="315" r="205"/>
    <ellipse cx="965" cy="315" rx="92" ry="205"/>
    <path d="M760 315h410M795 220h340M795 410h340"/>
  </g>

  <g transform="translate(82 70)">
    <g transform="translate(0 4)">
      <circle cx="32" cy="32" r="32" fill="#eaf7f1"/>
      <g transform="translate(14 16)" fill="#17695f">
        <rect x="0" y="10" width="4" height="12" rx="2"/>
        <rect x="8" y="4" width="4" height="24" rx="2"/>
        <rect x="16" y="0" width="4" height="32" rx="2"/>
        <rect x="24" y="6" width="4" height="20" rx="2"/>
        <rect x="32" y="11" width="4" height="10" rx="2"/>
      </g>
    </g>
    <text x="82" y="29" fill="#cce7dd" font-family="Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="3">SHALOMWORKS</text>
    <text x="82" y="58" fill="#ffffff" font-family="Georgia, serif" font-size="29" font-weight="700">Live Interpreter</text>
