    <text x="175" y="36" fill="#52706c" font-family="Arial, sans-serif" font-size="17" font-weight="700">INTERPRET</text>
    <text x="276" y="36" fill="#52706c" font-family="Arial, sans-serif" font-size="16" font-weight="700">LISTEN</text>
